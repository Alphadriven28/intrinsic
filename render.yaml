{
  "services": [
    {
      "type": "web",
      "name": "intrinsic-api",
      "runtime": "python",
      "region": "oregon",
      "plan": "free",
      "buildCommand": "pip install -r requirements.txt",
      "startCommand": "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120",
      "envVars": [
        {
          "key": "FMP_API_KEY",
          "sync": false
        },
        {
          "key": "SECRET_KEY",
          "generateValue": true
        },
        {
          "key": "PYTHON_VERSION",
          "value": "3.11.0"
        }
      ],
      "rootDir": "backend"
    }
  ]
}
